preprocessing:
  # Smoothing
  gaussian_sigma: 1.0

  # Rescaling
  rescale_factor: [3.8297, 0.81, 0.81]
  interpolation_order: 1

  # Filtering region of interest from boundary map
  filter_name: "triangle"



segmentation:
  # Boundary Prediction
  model_name: "confocal_3D_unet_ovules_ds2x"
  model_id : 

  # Boundary Prediction to Superpixels
  # threshold: 0.6 ###
  threshold: 0.3
  min_size: 100
  stacked: False

  # Superpixels to Instance Segmentation ##
  mode: "mutex_ws"
  beta: 0.6
  post_min_size: 100



postprocessing:
  # Remove Objects with Low Foreground Probability
  foreground_threshold: 0.1
